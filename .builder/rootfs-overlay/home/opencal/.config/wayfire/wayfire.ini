# Wayfire compositor configuration for OpenCAL.
# By default, Wayfire auto-detects the projector resolution via EDID.
#
# FIXME: If the projector does not report EDID, or a specific resolution must
# be enforced for print calibration accuracy, uncomment and edit the output
# section below. Run `wlr-randr` on a booted image to list available outputs
# and their supported modes, then set the correct output name and mode here.
#
# [output:HDMI-A-1]
# mode = 1920x1080@60
# position = 0,0
# transform = normal

[core]
plugins = required
