# METABEGIN
# X-Env-Layer-Name: opencal
# X-Env-Layer-Version: 1.0.0
# X-Env-Layer-Desc: OpenCAL CAL printer controller
# X-Env-Layer-Category: app
# X-Env-Layer-Requires: bookworm-minbase
# METAEND
---
mmdebstrap:
  packages:
    - python3
    - python3-venv
    - python3-pip
    - build-essential
    - python3-opencv
    - python3-picamera2
    - libcamera-apps
    - ffmpeg
    - mpv
    - v4l-utils
    - python3-gpiozero
    - python3-libgpiod
    - python3-spidev
    - python3-smbus2
    - i2c-tools
    - usbutils
    # Wayland compositor stack (matches default RPi OS Bookworm)
    - wayfire
    - xwayland
    - greetd
