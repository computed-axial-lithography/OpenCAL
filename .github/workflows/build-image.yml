name: Build Raspberry Pi Image
on:
  push:
    tags:
      - 'v*'

  workflow_dispatch:
    inputs:
      debug_mode:
        description: 'Run in debug mode?'
        required: false
        default: 'false'

jobs:
  build:
    runs-on: ubuntu-24.04-arm64
    permissions:
      contents: write

    steps:
      - name: Checkout Project Repo
        uses: actions/checkout@v4
        with:
          repository: computed-axial-lithography/OpenCAL
          path: OpenCAL
     
      - name: Checkout rpi-image-gen
        uses: actions/checkout@v4
        with:
          repository: raspberrypi/rpi-image-gen
          path: rpi-image-gen

      - name: Prepare Project Folder
        run: |
          rpi-image-gen/install-deps.sh
          mkdir -p rpi-image-gen/projects/OpenCAL
          cp -r OpenCAL/.builder/* rpi-image-gen/projects/OpenCAL

      - name: Build Image
        working-directory: rpi-image-gen
        run: |
          ./rpi-image-gen build -S projects/OpenCAL -c config.yaml -- \
            IGconf_sys_outputdir=${{ github.workspace }}/output \
            IGconf_sys_deploydir=${{ github.workspace }}/deploy

      - name: Release Image
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ github.workspace }}/deploy/*.img.xz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


