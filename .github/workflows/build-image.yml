name: Build Raspberry Pi Image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write

    steps:
      - name: Checkout OpenCAL repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}
          path: OpenCAL

      - name: Checkout rpi-image-gen
        uses: actions/checkout@v4
        with:
          repository: raspberrypi/rpi-image-gen
          path: rpi-image-gen

      - name: Install rpi-image-gen dependencies
        working-directory: rpi-image-gen
        run: sudo ./install_deps.sh

      - name: Install Raspberry Pi archive keyring
        run: |
          sudo apt-get install -y debian-archive-keyring
          sudo mkdir -p /usr/share/keyrings
          curl -fsSL https://archive.raspberrypi.com/debian/raspberrypi.gpg.key \
            | gpg --dearmor \
            | sudo tee /usr/share/keyrings/raspberrypi-archive-keyring.gpg > /dev/null

      - name: Prepare project folder
        run: |
          mkdir -p rpi-image-gen/projects/OpenCAL
          # Copy builder config (config.yaml, layer/, bdebstrap/, rootfs-overlay/)
          cp -r OpenCAL/.builder/. rpi-image-gen/projects/OpenCAL/
          # Copy OpenCAL source into SRCROOT as 'opencal-src' for the hook script
          cp -r OpenCAL/. rpi-image-gen/projects/OpenCAL/opencal-src/
          # Hook must be executable or rpi-image-gen silently skips it
          chmod +x rpi-image-gen/projects/OpenCAL/bdebstrap/customize01.sh

      - name: Build image
        working-directory: rpi-image-gen
        run: |
          ./rpi-image-gen build \
            -S projects/OpenCAL \
            -c projects/OpenCAL/config.yaml \
            -- \
            IGconf_deploy_dir=${{ github.workspace }}/deploy

      - name: Release image
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: ${{ github.workspace }}/deploy/*.img.zst
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
